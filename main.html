<html lang="en">
<head>
<meta charset= "UTF-8">
<title>Hero Section</title>	

<style>
	body {
		margin: 0;
		font-family: Arial, sans-serif;
	}

	.hero {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 40px;
		height: 100vh;
		box-sizing: border-box;
	}

	.hero-text {
		max-width: 50%;
	}

	.hero-text {
		font-size: 48px;
		margin-bottom: 20px;
	}

	.hero-text a {
		font-size: 18px;
		margin-bottom: 20px;
	}

	.hero-text a {
		padding: 12px 20px;
		background-color: #e60023;
		color: white;
		text-decoration: none;
		border-radius: 25px;
		display: inline-block;
	}

	.hero-image img {
		width: 100%:
		height: 100%;
		object-fit: cover;
		border-radius: 15px;
	}
</style>	
</head>
<body>
<div class = "hero">
	<div class = "hero-text">
		<h1>Get Your Next Idea</h1>
		<p>Explore inspiration, discover trends, and bring your creativity to life.</p>
		<a herf="#">Explore now</a>
	</div>

	<div class="hero-image">
		 <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="Hero Image">

</div>

</html>
